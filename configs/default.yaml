# Default configuration for discrete diffusion language model
# Usage: python scripts/train.py --config configs/default.yaml

# Diffusion process
T: 1000

# Model architecture
vocab_size: 32000
hidden_dim: 512
num_layers: 6
num_heads: 8
dropout: 0.1
max_seq_len: 512

# Training hyperparameters
lr: 0.0003
weight_decay: 0.01
batch_size: 32
seq_len: 128
warmup_steps: 2000
max_steps: 100000

# Optimization
grad_clip: 1.0
beta1: 0.9
beta2: 0.95

# Logging & checkpointing
log_every: 100
save_every: 5000
checkpoint_dir: checkpoints
log_dir: logs

# Special tokens
mask_token_id: 0
pad_token_id: 1
eos_token_id: 2

# Data
data_path: data/train.txt
num_workers: 4

# Mixed precision
use_amp: true

# Optional logging
use_wandb: false
use_tensorboard: false
