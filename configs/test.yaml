# Small configuration for testing/debugging
# Usage: python scripts/train.py --config configs/test.yaml

# Diffusion process
T: 100

# Model architecture (very small for CPU testing)
vocab_size: 500
hidden_dim: 64
num_layers: 1
num_heads: 4
dropout: 0.0
max_seq_len: 32

# Training hyperparameters
lr: 0.001
weight_decay: 0.01
batch_size: 4
seq_len: 16
warmup_steps: 50
max_steps: 100

# Optimization
grad_clip: 1.0
beta1: 0.9
beta2: 0.95

# Logging & checkpointing
log_every: 10
save_every: 100
checkpoint_dir: checkpoints_test
log_dir: logs_test

# Special tokens
mask_token_id: 0
pad_token_id: 1
eos_token_id: 2

# Data
data_path: data/train.txt
num_workers: 0

# Mixed precision (disabled for CPU)
use_amp: false

# Optional logging
use_wandb: false
use_tensorboard: false
